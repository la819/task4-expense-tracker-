<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dashboard-body">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-logo">💰 Expense Tracker</div>
    <div class="nav-right">
      <span id="navUser"></span>
      <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
  </nav>

  <div class="dashboard-wrapper">

    <!-- Summary Cards -->
    <div class="cards-grid">
      <div class="summary-card total">
        <h3>Total Expenses</h3>
        <p id="totalAmount">Rs. 0</p>
      </div>
      <div class="summary-card count">
        <h3>Total Records</h3>
        <p id="totalCount">0</p>
      </div>
      <div class="summary-card user-card-info">
        <h3>Logged in as</h3>
        <p id="loggedUser">-</p>
      </div>
    </div>

    <!-- Add Expense Form -->
    <div class="form-card">
      <h3 id="formTitle">➕ Add New Expense</h3>
      <div class="form-grid">
        <input type="text"   id="title"    placeholder="Expense Title"  />
        <input type="number" id="amount"   placeholder="Amount (Rs.)"   />
        <select id="category">
          <option value="">Select Category</option>
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Health">🏥 Health</option>
          <option value="Education">📚 Education</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Other">📦 Other</option>
        </select>
        <input type="date" id="date" />
      </div>
      <div class="btn-group">
        <button class="btn-primary" id="submitBtn" onclick="submitExpense()">➕ Add Expense</button>
        <button class="btn-cancel"  id="cancelBtn" onclick="cancelEdit()" style="display:none">✖ Cancel</button>
      </div>
      <p id="formMsg"></p>
    </div>

    <!-- Expenses Table -->
    <div class="table-card">
      <h3>📋 My Expenses</h3>
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="expenseList"></tbody>
      </table>
    </div>

  </div>

  <script src="dashboard.js"></script>
</body>
</html>
